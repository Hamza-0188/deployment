name: wf-pr-validation

on: 
  pull_request:
    branches: 
      - develop
    types: [opened, synchronize, reopened]
  
jobs:
  linting-job:
    name: lint html and css files
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code to Runner
      uses: actions/checkout@v4
    - name: Lint HTML files
      run: npx htmlhint "**/*.html"
    - name: Lint CSS files
      run: npx stylelint "**/*.css"
  Build-job:
    name: Build the project by using Parcel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code to Runner
        uses: actions/checkout@v4
      - name: Build website with Parcel
        run: npx parcel build "./src/*.html" --dist-dir "./dist" --public-url "./dist"
      - name: Upload build Artifacts to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"
          name: "Build-artifact-develop"